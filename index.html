<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK Store</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#090909;
color:white;
}

/* HEADER */
header{
background:linear-gradient(135deg,#12001f,#250042);
padding:20px;
text-align:center;
border-bottom:2px solid #8f42ff;
position:relative;
}

.logo{
font-size:34px;
font-weight:bold;
color:#b06bff;
}

.subtitle{
color:#ccc;
margin-top:5px;
}

/* CART ICON */
.cart-icon{
position:absolute;
top:15px;
right:15px;
background:#8f42ff;
padding:10px 14px;
border-radius:50px;
cursor:pointer;
font-weight:bold;
box-shadow:0 0 10px #8f42ff;
}

/* BANNER */
.banner{
margin:20px;
padding:20px;
border-radius:20px;
background:#171717;
border:1px solid #8f42ff;
text-align:center;
}

.banner img{
width:100%;
border-radius:15px;
}

/* CATEGORIES */
.categories{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:20px;
}

.category{
background:#171717;
padding:15px;
border-radius:15px;
text-align:center;
cursor:pointer;
transition:0.2s;
}

.category:hover{
background:#222;
}

/* PRODUCTS */
.products{
padding:20px;
display:grid;
gap:15px;
}

.card{
background:#171717;
border-radius:20px;
padding:15px;
border:1px solid #2e2e2e;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
}

.price{
color:#b06bff;
font-size:22px;
font-weight:bold;
margin-top:10px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#8f42ff;
border:none;
color:white;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

/* CART */
#cart-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
z-index:1000;
}

#cart-panel{
position:fixed;
top:0;
right:-400px;
width:350px;
height:100%;
background:#171717;
z-index:1001;
padding:20px;
transition:0.3s;
}

#cart-panel.open{
right:0;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:10px 0;
padding:10px;
background:#222;
border-radius:10px;
}

/* FOOTER */
footer{
padding:25px;
text-align:center;
color:#888;
}
</style>

</head>

<body>

<header>
<div class="logo">SK STORE</div>
<div class="subtitle">Игровые товары Brawl Stars</div>

<div class="cart-icon" onclick="openCart()">
🛒 <span id="cart-counter">0</span>
</div>
</header>

<!-- CART -->
<div id="cart-overlay" onclick="closeCart()"></div>

<div id="cart-panel">
  <h2>🛒 Корзина</h2>

  <div id="cart-items"></div>

  <h3>Итого: <span id="cart-total">0</span> ₽</h3>

  <button onclick="alert('Здесь будет оформление заказа')">
    Оформить заказ
  </button>

  <button onclick="closeCart()">Закрыть</button>
</div>

<!-- BANNER -->
<div class="banner">
<img src="https://github.com/user-attachments/assets/48ec96f9-f570-4809-88b2-b67adbc084c4">
</div>
<div class="categories">

  <div class="category active" onclick="filterProducts('all', this)">Все</div>

  <div class="category" onclick="filterProducts('gems', this)">Гемы</div>
  <div class="category" onclick="filterProducts('passes', this)">Пропуски</div>
  <div class="category" onclick="filterProducts('skins', this)">Скины</div>
  <div class="category" onclick="filterProducts('resources', this)">Ресурсы</div>
  <div class="category" onclick="filterProducts('sales', this)">Акции</div>

</div>
<!-- PRODUCTS -->
<div class="products">

<div class="card"data-category="gems">
<h3>30 Gems</h3>
<div class="price">130 ₽</div>
<button onclick="addToCart('30 Gems',130)">В корзину</button>
</div>

<div class="card"data-category="gems">
<h3>80 Gems</h3>
<div class="price">250 ₽</div>
<button onclick="addToCart('80 Gems',250)">В корзину</button>
</div>

<div class="card"data-category="gems">
<h3>170 Gems</h3>
<div class="price">500 ₽</div>
<button onclick="addToCart('170 Gems',500)">В корзину</button>
</div>

<div class="card"data-category="passes">
<h3>Brawl Pass</h3>
<div class="price">300 ₽</div>
<button onclick="addToCart('Brawl Pass',300)">В корзину</button>
</div>

</div>

<footer>
SK Store © 2026
</footer>

<script>

let cart = [];

function addToCart(name, price){
let item = cart.find(i => i.name === name);

if(item){
item.qty++;
}else{
cart.push({name, price, qty:1});
}

updateCart();
}

function openCart(){
document.getElementById("cart-overlay").style.display="block";
document.getElementById("cart-panel").classList.add("open");
}

function closeCart(){
document.getElementById("cart-overlay").style.display="none";
document.getElementById("cart-panel").classList.remove("open");
}

function updateCart(){

let items = document.getElementById("cart-items");
let total = 0;
let count = 0;

items.innerHTML = "";

cart.forEach(item=>{
total += item.price * item.qty;
count += item.qty;

items.innerHTML += `
<div class="cart-item">
<div>${item.name}</div>
<div>${item.qty} × ${item.price} ₽</div>
</div>
`;
});

document.getElementById("cart-total").innerText = total;
document.getElementById("cart-counter").innerText = count;
}
function filterProducts(category, el){

  let cards = document.querySelectorAll(".card");
  let cats = document.querySelectorAll(".category");

  cats.forEach(c => c.classList.remove("active"));
  el.classList.add("active");

  cards.forEach(card => {

    if(category === "all"){
      card.style.display = "block";
      return;
    }

    if(card.dataset.category === category){
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }

  });
}
</script>

</body>
</html>
