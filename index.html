<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK Store</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#090909;
color:white;
}

/* HEADER */
header{
background:linear-gradient(135deg,#12001f,#250042);
padding:20px;
text-align:center;
border-bottom:2px solid #8f42ff;
position:relative;
}

.logo{
font-size:34px;
font-weight:bold;
color:#b06bff;
}

.subtitle{
color:#ccc;
margin-top:5px;
}

/* CART ICON */
.cart-icon{
position:absolute;
top:15px;
right:15px;
background:#8f42ff;
padding:10px 14px;
border-radius:50px;
cursor:pointer;
font-weight:bold;
box-shadow:0 0 10px #8f42ff;
}

/* BANNER */
.banner{
margin:20px;
padding:20px;
border-radius:20px;
background:#171717;
border:1px solid #8f42ff;
text-align:center;
}

.banner img{
width:100%;
border-radius:15px;
}

/* CATEGORIES */
.categories{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:20px;
}

.category{
background:#171717;
padding:15px;
border-radius:15px;
text-align:center;
cursor:pointer;
transition:0.25s;
border:1px solid #2a2a2a;
}

.category.active{
background:#8f42ff;
color:white;
box-shadow:0 0 15px rgba(143,66,255,0.5);
}

/* PRODUCTS */
.products{
padding:20px;
display:grid;
gap:15px;
}

.card{
background:rgba(255,255,255,0.04);
backdrop-filter:blur(10px);
border-radius:20px;
padding:15px;
border:1px solid rgba(143,66,255,0.25);
transition:0.3s;
overflow:hidden;
position:relative;
}

.card.hide{
opacity:0;
transform:scale(0.9);
pointer-events:none;
}

.price{
color:#b06bff;
font-size:22px;
margin-top:10px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:linear-gradient(135deg,#8f42ff,#b06bff);
border:none;
color:white;
border-radius:12px;
cursor:pointer;
}

/* CART */
#cart-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
display:none;
z-index:1000;
}

#cart-panel{
position:fixed;
top:0;
right:-400px;
width:350px;
height:100%;
background:#171717;
padding:20px;
transition:0.3s;
z-index:1001;
}

#cart-panel.open{
right:0;
}

.cart-item{
display:flex;
justify-content:space-between;
padding:10px;
margin:10px 0;
background:#222;
border-radius:10px;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.7);
z-index:2000;
}

.modal-content{
background:#171717;
padding:20px;
border-radius:15px;
width:90%;
max-width:400px;
border:1px solid #8f42ff;
}

/* TOAST */
.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#8f42ff;
padding:10px 20px;
border-radius:10px;
z-index:9999;
}

/* particles */
#particles{
position:fixed;
inset:0;
z-index:-1;
}

.particle{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
background:#8f42ff;
opacity:0.3;
animation:float 10s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* fly animation */
.fly-item{
position:fixed;
width:10px;
height:10px;
background:#8f42ff;
border-radius:50%;
z-index:9999;
pointer-events:none;
}
</style>
</head>

<body>

<div id="particles"></div>

<header>
<div class="logo">SK STORE</div>

<div class="cart-icon" onclick="openCart()">
🛒 <span id="cart-counter">0</span>
</div>
</header>

<div id="cart-overlay" onclick="closeCart()"></div>

<div id="cart-panel">
<h2>Корзина</h2>
<div id="cart-items"></div>
<h3>Итого: <span id="cart-total">0</span> ₽</h3>

<button onclick="sendOrder()">Оформить заказ</button>
<button onclick="closeCart()">Закрыть</button>
</div>

<!-- CATEGORIES -->
<div class="categories">
<div class="category active" onclick="filter('all',this)">Все</div>
<div class="category" onclick="filter('gems',this)">Гемы</div>
<div class="category" onclick="filter('passes',this)">Пропуски</div>
<div class="category" onclick="filter('skins',this)">Скины</div>
<div class="category" onclick="filter('resources',this)">Ресурсы</div>
<div class="category" onclick="filter('sales',this)">Акции</div>
</div>

<!-- PRODUCTS -->
<div class="products">

<div class="card" data-category="gems">
<h3>30 Gems</h3>
<div class="price">130 ₽</div>
<button onclick="add('30 Gems',130,this)">В корзину</button>
</div>

<div class="card" data-category="gems">
<h3>80 Gems</h3>
<div class="price">250 ₽</div>
<button onclick="add('80 Gems',250,this)">В корзину</button>
</div>

<div class="card" data-category="gems">
<h3>170 Gems</h3>
<div class="price">500 ₽</div>
<button onclick="add('170 Gems',500,this)">В корзину</button>
</div>

<div class="card" data-category="passes">
<h3>Brawl Pass</h3>
<div class="price">300 ₽</div>
<button onclick="add('Brawl Pass',300,this)">В корзину</button>
</div>

<div class="card" data-category="skins">
<h3>Skin Pack</h3>
<div class="price">400 ₽</div>
<button onclick="add('Skin Pack',400,this)">В корзину</button>
</div>

</div>

<!-- CHECKOUT -->
<div id="checkout" class="modal">
<div class="modal-content">
<h2 id="orderText"></h2>

<p>💳 Т-Банк: XXXX XXXX XXXX XXXX</p>
<p>👤 Получатель: Имя Фамилия</p>

<p>Отправьте скрин оплаты в Telegram: @asssssuna</p>

<button onclick="closeCheckout()">Закрыть</button>
</div>
</div>

<script>

let cart = [];
let orderId = Math.floor(1000 + Math.random()*9000);

/* ADD TO CART */
function add(name,price,btn){

let item = cart.find(i=>i.name===name);

if(item) item.qty++;
else cart.push({name,price,qty:1});

updateCart();
fly(btn);
toast("Добавлено");
}

/* CART */
function updateCart(){

let items=document.getElementById("cart-items");
let total=0,count=0;

items.innerHTML="";

cart.forEach(i=>{
total+=i.price*i.qty;
count+=i.qty;

items.innerHTML+=`
<div class="cart-item">
<div>${i.name}</div>
<div>${i.qty}</div>
</div>`;
});

document.getElementById("cart-total").innerText=total;
document.getElementById("cart-counter").innerText=count;
}

/* CART OPEN/CLOSE */
function openCart(){
document.getElementById("cart-panel").classList.add("open");
document.getElementById("cart-overlay").style.display="block";
}

function closeCart(){
document.getElementById("cart-panel").classList.remove("open");
document.getElementById("cart-overlay").style.display="none";
}

/* FILTER */
function filter(cat,el){

document.querySelectorAll(".category").forEach(c=>c.classList.remove("active"));
el.classList.add("active");

document.querySelectorAll(".card").forEach(card=>{
card.style.display =
cat==="all" || card.dataset.category===cat ? "block":"none";
});
}

/* SEND ORDER */
async function sendOrder(){

if(cart.length===0){toast("Корзина пуста");return;}

let total=cart.reduce((s,i)=>s+i.price*i.qty,0);

const res=await fetch("/api/order",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({cart,total})
});

if(res.ok){

cart=[];
updateCart();
closeCart();

document.getElementById("orderText").innerText =
"Заказ #"+orderId+" создан";

document.getElementById("checkout").style.display="flex";
}
}

/* CLOSE MODAL */
function closeCheckout(){
document.getElementById("checkout").style.display="none";
}

/* TOAST */
function toast(text){
let t=document.createElement("div");
t.className="toast";
t.innerText=text;
document.body.appendChild(t);
setTimeout(()=>t.remove(),1500);
}

/* FLY ANIMATION */
function fly(btn){

let cartIcon=document.querySelector(".cart-icon");

let start=btn.getBoundingClientRect();
let end=cartIcon.getBoundingClientRect();

let dot=document.createElement("div");
dot.className="fly-item";

dot.style.left=start.left+"px";
dot.style.top=start.top+"px";

document.body.appendChild(dot);

dot.animate([
{transform:"translate(0,0)"},
{transform:`translate(${end.left-start.left}px,${end.top-start.top}px)`}
],{duration:600});

setTimeout(()=>dot.remove(),600);
}

</script>

</body>
</html>
