<script>

let cart = [];

function addToCart(name, price) {

  let item = cart.find(i => i.name === name);

  if (item) {
    item.qty += 1;
  } else {
    cart.push({ name, price, qty: 1 });
  }

  animateCart();
  updateCart();
}

function updateCart() {

  let items = document.getElementById("cart-items");
  let total = 0;
  let count = 0;

  items.innerHTML = "";

  cart.forEach((item, index) => {

    total += item.price * item.qty;
    count += item.qty;

    items.innerHTML += `
      <div style="
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin:10px 0;
        padding:10px;
        background:#222;
        border-radius:10px;
      ">

        <div style="flex:1">
          ${item.name}
        </div>

        <div style="display:flex;align-items:center;gap:8px;">

          <button onclick="changeQty(${index}, -1)" style="width:30px;">-</button>

          <span>${item.qty}</span>

          <button onclick="changeQty(${index}, 1)" style="width:30px;">+</button>

          <b>${item.price * item.qty} ₽</b>

          <button onclick="removeItem(${index})" style="background:red;width:30px;">
            ×
          </button>

        </div>

      </div>
    `;
  });

  document.getElementById("cart-total").innerText = total;
  document.getElementById("cart-counter").innerText = count;
}

function changeQty(index, value) {
  cart[index].qty += value;

  if (cart[index].qty <= 0) {
    cart.splice(index, 1);
  }

  updateCart();
}

function removeItem(index) {
  cart.splice(index, 1);
  updateCart();
}

function toggleCart() {
  document.getElementById("cart-modal").style.display = "block";
}

function closeCart() {
  document.getElementById("cart-modal").style.display = "none";
}

/* ✨ анимация корзины */
function animateCart() {
  let icon = document.querySelector(".cart-icon");

  icon.style.transform = "scale(1.25)";
  icon.style.transition = "0.2s";

  setTimeout(() => {
    icon.style.transform = "scale(1)";
  }, 200);
}
function filterProducts(category) {

  let products = document.querySelectorAll(".card");
  let categories = document.querySelectorAll(".category");

  categories.forEach(c => c.classList.remove("active"));

  event.target.classList.add("active");

  products.forEach(card => {

    if (category === "all") {
      card.style.display = "block";
      return;
    }

    if (card.dataset.category === category) {
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }

  });
}
</script>
