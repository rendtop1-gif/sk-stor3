<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SK Store</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#090909;
color:white;
}

header{
background:linear-gradient(135deg,#12001f,#250042);
padding:20px;
text-align:center;
border-bottom:2px solid #8f42ff;
}

.logo{
font-size:34px;
font-weight:bold;
color:#b06bff;
}

.subtitle{
color:#ccc;
margin-top:5px;
}

.banner{
margin:20px;
padding:20px;
border-radius:20px;
background:#171717;
border:1px solid #8f42ff;
text-align:center;
}

.banner h2{
color:#b06bff;
margin-bottom:10px;
}

.categories{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:20px;
}

.category{
background:#171717;
padding:15px;
border-radius:15px;
text-align:center;
border:1px solid #2e2e2e;
}

.products{
padding:20px;
display:grid;
gap:15px;
}

.card{
background:#171717;
border-radius:20px;
padding:15px;
border:1px solid #2e2e2e;
}

.card h3{
margin-bottom:10px;
}

.price{
color:#b06bff;
font-size:22px;
font-weight:bold;
margin-top:10px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#8f42ff;
border:none;
color:white;
border-radius:12px;
font-weight:bold;
}

footer{
padding:25px;
text-align:center;
color:#888;
}
</style>

</head>

<body>

<header>
<div class="logo">SK STORE</div>
<div class="subtitle">Игровые товары Brawl Stars</div>
</header>

<div class="banner">
<h2>Добро пожаловать в SK Store</h2>
<p>Быстрая выдача • Поддержка • Лучшие цены</p>
</div>

<div class="categories">
<div class="category">Популярное</div>
<div class="category">Акции</div>
<div class="category">Гемы</div>
<div class="category">Ресурсы</div>
<div class="category">Скины</div>
<div class="category">Пропуска</div>
</div>

<div class="products">

<div class="card">
<h3>30 Gems</h3>
<div class="price">130 ₽</div>
<button>В корзину</button>
</div>

<div class="card">
<h3>80 Gems</h3>
<div class="price">250 ₽</div>
<button>В корзину</button>
</div>

<div class="card">
<h3>170 Gems</h3>
<div class="price">500 ₽</div>
<button>В корзину</button>
</div>

<div class="card">
<h3>Brawl Pass</h3>
<div class="price">300 ₽</div>
<button>В корзину</button>
</div>

<div class="card">
<h3>Brawl Pass Plus</h3>
<div class="price">650 ₽</div>
<button>В корзину</button>
</div>

</div>

<footer>
SK Store © 2025
</footer>

</body>
</html>
