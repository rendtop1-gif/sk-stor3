<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>SK STORE</title>

  <style>
    :root {
  --bg: #080808;
  --card: #141414;
  --card2: #1d1d1d;
  --text: #ffffff;
  --gray: #999;
  --border: #262626;
}

body {
  background: var(--bg);
  color: var(--text);
  margin: 0;
  font-family: Inter, sans-serif;
}

header {
  position: fixed;
  width: 100%;
  height: 70px;
  background: rgba(8,8,8,.95);
  backdrop-filter: blur(15px);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 30px;
  box-sizing: border-box;
  z-index: 999;
}

.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.hero h1 {
  font-size: 70px;
}

.hero p {
  color: var(--gray);
}

.products {
  display: grid;
  grid-template-columns:
  repeat(auto-fit,minmax(250px,1fr));
  gap: 30px;
}

button {
  background: white;
  color: black;
  border: none;
  border-radius: 15px;
  padding: 15px 30px;
  cursor: pointer;
}
  </style>
</head>
<body>

  <header>
  <div class="logo">SK STORE</div>

  <nav>
    <a href="#catalog">Каталог</a>
    <a href="#about">О нас</a>
    <a href="#cart">Корзина</a>
  </nav>
</header>

  <section class="hero">
  <div class="hero-content">
    <h1>НОВАЯ КОЛЛЕКЦИЯ</h1>
    <p>Streetwear & Accessories</p>

    <button id="catalogBtn">
      Смотреть каталог
    </button>
  </div>
</section>

 <section id="catalog">

  <div class="catalog-title">
    Каталог
  </div>

  <div class="products" id="products">

  </div>

</section>

  <section id="cart">

  <h2>Корзина</h2>

  <div id="cartItems">

  </div>

  <div class="total">
    Итого:
    <span id="totalPrice">
      0 ₽
    </span>
  </div>

  <button id="checkoutBtn">
    Оформить заказ
  </button>

</section>

  <div class="checkout">

  <input
    id="name"
    placeholder="Ваше имя"
  >

  <input
    id="tg"
    placeholder="@telegram"
  >

  <input
    id="phone"
    placeholder="+7..."
  >

  <textarea
    id="comment"
    placeholder="Комментарий"
  ></textarea>

  <button id="sendOrder">
    Отправить заказ
  </button>

</div>

  <script>
    const products = [
  {
    id: 1,
    name: "Худи SK",
    price: 4990,
    image: "img/products/1.jpg"
  },
  {
    id: 2,
    name: "Футболка SK",
    price: 2490,
    image: "img/products/2.jpg"
  }
];

const productsContainer =
document.getElementById("products");

products.forEach(product => {

  productsContainer.innerHTML += `
    <div class="product">

      <img src="${product.image}">

      <div class="product-info">

        <h3>${product.name}</h3>

        <p>${product.price} ₽</p>

        <button onclick="addToCart(${product.id})">
          В корзину
        </button>

      </div>

    </div>
  `;
});

let cart = [];

function addToCart(id) {
  const product =
  products.find(p => p.id === id);

  cart.push(product);

  renderCart();
}

function renderCart() {
  const items =
  document.getElementById("cartItems");

  items.innerHTML = "";

  let total = 0;

  cart.forEach(item => {

    total += item.price;

    items.innerHTML += `
      <div>
        ${item.name}
        ${item.price} ₽
      </div>
    `;
  });

  document.getElementById(
    "totalPrice"
  ).innerText = total + " ₽";
}


  </script>

</body>
</html>
