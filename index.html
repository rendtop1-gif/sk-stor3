<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK Store</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#090909;
color:white;
}

/* HEADER */
header{
background:linear-gradient(135deg,#12001f,#250042);
padding:20px;
text-align:center;
border-bottom:2px solid #8f42ff;
position:relative;
}

.logo{
font-size:34px;
font-weight:bold;
color:#b06bff;
}

.subtitle{
color:#ccc;
margin-top:5px;
}

/* CART ICON */
.cart-icon{
position:absolute;
top:15px;
right:15px;
background:#8f42ff;
padding:10px 14px;
border-radius:50px;
cursor:pointer;
font-weight:bold;
box-shadow:0 0 10px #8f42ff;
}

/* BANNER */
.banner{
margin:20px;
padding:20px;
border-radius:20px;
background:#171717;
border:1px solid #8f42ff;
text-align:center;
}

.banner img{
width:100%;
border-radius:15px;
}

/* CATEGORIES */
.categories{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:20px;
}

.category{

background:#171717;

padding:15px;

border-radius:15px;

text-align:center;

cursor:pointer;

transition:0.25s;

border:1px solid #2a2a2a;

}

.category.active{

background:linear-gradient(
135deg,
#8f42ff,
#b06bff
);

color:white;

border-color:#b06bff;

box-shadow:
0 0 15px rgba(143,66,255,0.5);

}

.category:hover{
background:#222;
}

/* PRODUCTS */
.products{
padding:20px;
display:grid;
gap:15px;
}

.card{

background:rgba(255,255,255,0.04);

backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);

border-radius:20px;
padding:15px;

border:1px solid rgba(143,66,255,0.25);

box-shadow:
0 0 10px rgba(143,66,255,0.08);

transition:0.3s ease;

position:relative;
overflow:hidden;

}

.card::before{

content:"";

position:absolute;

top:0;
left:-100%;

width:100%;
height:2px;

background:linear-gradient(
90deg,
transparent,
#8f42ff,
#ff4fd8,
transparent
);

transition:0.5s;

}

.card.hide{
opacity:0;
transform:scale(0.9);
pointer-events:none;
}

.card:hover{

transform:translateY(-4px);

border-color:#8f42ff;

box-shadow:
0 0 25px rgba(143,66,255,0.45),
0 0 40px rgba(255,79,216,0.15);

}

.card:hover::before{
left:100%;
}

.price{
color:#b06bff;
font-size:22px;
font-weight:bold;
margin-top:10px;
}

button{

width:100%;

padding:12px;

margin-top:15px;

background:linear-gradient(
135deg,
#8f42ff,
#b06bff
);

border:none;

color:white;

border-radius:12px;

font-weight:bold;

cursor:pointer;

transition:0.25s;

}

button:hover{

transform:translateY(-2px);

box-shadow:
0 0 20px rgba(143,66,255,0.6);

}

/* CART */
#cart-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
z-index:1000;
}

#cart-panel{
position:fixed;
top:0;
right:-400px;
width:350px;
height:100%;
background:#171717;
z-index:1001;
padding:20px;
transition:0.3s;
}

#cart-panel.open{
right:0;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:10px 0;
padding:10px;
background:#222;
border-radius:10px;
}

/* FOOTER */
footer{
padding:25px;
text-align:center;
color:#888;
}
.card{
  transition:0.3s ease;
}

.card.hide{
  opacity:0;
  transform:scale(0.95);
  pointer-events:none;

}

.glow-title{

background:linear-gradient(
90deg,
#8f42ff,
#ff4fd8,
#8f42ff
);

background-size:300% 100%;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:shine 4s linear infinite;

filter:drop-shadow(0 0 10px rgba(143,66,255,0.5));

}

@keyframes shine{
  0%{background-position:0%}
  100%{background-position:200%}
}
.fly-item{

position:fixed;

z-index:9999;

width:20px;
height:20px;

border-radius:50%;

background:#8f42ff;

pointer-events:none;

box-shadow:0 0 15px #8f42ff;

}
</style>

</head>

<body>

<header>
<div class="logo glow-title">SK STORE</div>
<div class="subtitle">Игровые товары Brawl Stars</div>

<div class="cart-icon" onclick="openCart()">
🛒 <span id="cart-counter">0</span>
</div>
</header>

<!-- CART -->
<div id="cart-overlay" onclick="closeCart()"></div>

<div id="cart-panel">
  <h2>🛒 Корзина</h2>

  <div id="cart-items"></div>

  <h3>Итого: <span id="cart-total">0</span> ₽</h3>

  <button onclick="alert('Здесь будет оформление заказа')">
    Оформить заказ
  </button>

  <button onclick="closeCart()">Закрыть</button>
</div>

<!-- BANNER -->
<div class="banner">
<img src="https://github.com/user-attachments/assets/48ec96f9-f570-4809-88b2-b67adbc084c4">
</div>
<div class="categories">

  <div class="category active" onclick="filterProducts('all', this)">Все</div>

  <div class="category" onclick="filterProducts('gems', this)">Гемы</div>
  <div class="category" onclick="filterProducts('passes', this)">Пропуски</div>
  <div class="category" onclick="filterProducts('skins', this)">Скины</div>
  <div class="category" onclick="filterProducts('resources', this)">Ресурсы</div>
  <div class="category" onclick="filterProducts('sales', this)">Акции</div>

</div>
<!-- PRODUCTS -->
<div class="products">

<div class="card"data-category="gems">
<h3>30 Gems</h3>
<div class="price">130 ₽</div>
<button onclick="addToCart('30 Gems',130,this)">В корзину</button>
</div>

<div class="card"data-category="gems">
<h3>80 Gems</h3>
<div class="price">250 ₽</div>
<button onclick="addToCart('80 Gems',250,this)">В корзину</button>
</div>

<div class="card"data-category="gems">
<h3>170 Gems</h3>
<div class="price">500 ₽</div>
<button onclick="addToCart('170 Gems',500,this)">В корзину</button>
</div>

<div class="card"data-category="passes">
<h3>Brawl Pass</h3>
<div class="price">300 ₽</div>
<button onclick="addToCart('Brawl Pass',300,this)">В корзину</button>
</div>

</div>

<footer>
SK Store © 2026
</footer>

<script>

let cart = [];

/* ДОБАВИТЬ В КОРЗИНУ */
function addToCart(name, price, btn){

  let item = cart.find(i => i.name === name);

  if(item){
    item.qty++;
  }else{
    cart.push({
      name:name,
      price:price,
      qty:1
    });
  }

  updateCart();

flyToCart(btn);

  if(btn){

    btn.innerText = "✓ Добавлено";
    btn.style.background = "#22c55e";

    setTimeout(()=>{
      btn.innerText = "В корзину";
      btn.style.background = "#8f42ff";
    },1200);

  }

  toast("Товар добавлен");
}

/* ОТКРЫТЬ КОРЗИНУ */
function openCart(){

  document.getElementById("cart-overlay").style.display = "block";
  document.getElementById("cart-panel").classList.add("open");

}

/* ЗАКРЫТЬ КОРЗИНУ */
function closeCart(){

  document.getElementById("cart-overlay").style.display = "none";
  document.getElementById("cart-panel").classList.remove("open");

}

/* ОБНОВИТЬ КОРЗИНУ */
function updateCart(){

  let items = document.getElementById("cart-items");

  let total = 0;
  let count = 0;

  items.innerHTML = "";

  cart.forEach((item,index)=>{

    total += item.price * item.qty;
    count += item.qty;

    items.innerHTML += `
      <div class="cart-item">

        <div>
          <b>${item.name}</b><br>
          ${item.price * item.qty} ₽
        </div>

        <div style="display:flex;gap:5px;align-items:center;">

          <button onclick="changeQty(${index},-1)" style="width:35px;">-</button>

          <span>${item.qty}</span>

          <button onclick="changeQty(${index},1)" style="width:35px;">+</button>

          <button onclick="removeItem(${index})" style="background:red;width:35px;">
            ×
          </button>

        </div>

      </div>
    `;

  });

  document.getElementById("cart-total").innerText = total;
  document.getElementById("cart-counter").innerText = count;

}

/* ИЗМЕНИТЬ КОЛИЧЕСТВО */
function changeQty(index,val){

  cart[index].qty += val;

  if(cart[index].qty <= 0){
    cart.splice(index,1);
  }

  updateCart();

}

/* УДАЛИТЬ ТОВАР */
function removeItem(index){

  cart.splice(index,1);
  updateCart();

}

/* ФИЛЬТР КАТЕГОРИЙ */
function filterProducts(category, el){

  let cards = document.querySelectorAll(".card");
  let cats = document.querySelectorAll(".category");

  cats.forEach(cat=>{
    cat.classList.remove("active");
  });

  el.classList.add("active");

  cards.forEach(card=>{

    let show =
      category === "all" ||
      card.dataset.category === category;

    if(show){

      card.style.display = "block";

      setTimeout(()=>{
        card.classList.remove("hide");
      },10);

    }else{

      card.classList.add("hide");

      setTimeout(()=>{
        card.style.display = "none";
      },300);

    }

  });

}
function flyToCart(btn){

  if(!btn) return;

  let cart = document.querySelector(".cart-icon");

  let start = btn.getBoundingClientRect();
  let end = cart.getBoundingClientRect();

  let dot = document.createElement("div");

  dot.className = "fly-item";

  dot.style.left = start.left + "px";
  dot.style.top = start.top + "px";

  document.body.appendChild(dot);

  let x = end.left - start.left;
  let y = end.top - start.top;

  dot.animate([
    {
      transform:"translate(0,0) scale(1)",
      opacity:1
    },
    {
      transform:`translate(${x}px,${y}px) scale(0.3)`,
      opacity:0
    }
  ],{
    duration:700,
    easing:"cubic-bezier(.2,.8,.2,1)"
  });

  setTimeout(()=>{
    dot.remove();
  },700);

}
</script>

</body>
</html>
