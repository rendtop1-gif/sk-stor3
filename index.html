<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK Store</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#090909;
color:white;
overflow-x:hidden;
}

/* ===== PARTICLES ===== */
#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
pointer-events:none;
}

.particle{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
background:rgba(143,66,255,0.25);
animation:float linear infinite;
filter:blur(2px);
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

/* HEADER */
header{
background:linear-gradient(135deg,#12001f,#250042);
padding:20px;
text-align:center;
border-bottom:2px solid #8f42ff;
position:relative;
}

.glow-title{
background:linear-gradient(90deg,#8f42ff,#ff4fd8,#8f42ff);
background-size:300% 100%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:shine 4s linear infinite;
}

@keyframes shine{
0%{background-position:0%}
100%{background-position:200%}
}

.cart-icon{
position:absolute;
top:15px;
right:15px;
background:#8f42ff;
padding:10px 14px;
border-radius:50px;
cursor:pointer;
}

/* BANNER */
.banner{
margin:20px;
border-radius:20px;
overflow:hidden;
}

.banner img{
width:100%;
display:block;
}

/* CATEGORIES */
.categories{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:20px;
}

.category{
background:#171717;
padding:12px;
border-radius:12px;
text-align:center;
cursor:pointer;
transition:.3s;
border:1px solid #2a2a2a;
}

.category.active{
background:linear-gradient(135deg,#8f42ff,#b06bff);
}

/* PRODUCTS */
.products{
padding:20px;
display:grid;
gap:15px;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-radius:20px;
padding:15px;
border:1px solid rgba(143,66,255,0.2);
transition:.3s;
}

.card:hover{
transform:translateY(-4px);
}

.card.hide{
opacity:0;
transform:scale(.95);
pointer-events:none;
}

.price{
color:#b06bff;
font-size:20px;
margin-top:8px;
}

button{
width:100%;
padding:12px;
margin-top:12px;
background:#8f42ff;
border:none;
border-radius:12px;
color:white;
cursor:pointer;
}

/* CART */
#cart-panel{
position:fixed;
right:-400px;
top:0;
width:350px;
height:100%;
background:#171717;
transition:.3s;
padding:20px;
z-index:999;
}

#cart-panel.open{
right:0;
}

#cart-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
display:none;
z-index:998;
}

.cart-item{
display:flex;
justify-content:space-between;
padding:10px;
background:#222;
border-radius:10px;
margin-top:10px;
}

/* fly effect */
.fly-item{
position:fixed;
width:10px;
height:10px;
border-radius:50%;
background:#8f42ff;
z-index:9999;
}
</style>
</head>

<body>

<div id="particles"></div>

<header>
<div class="logo glow-title">SK STORE</div>

<div class="cart-icon" onclick="openCart()">
🛒 <span id="cart-counter">0</span>
</div>
</header>

<div id="cart-overlay" onclick="closeCart()"></div>

<div id="cart-panel">
<h2>Корзина</h2>
<div id="cart-items"></div>
<h3>Итого: <span id="cart-total">0</span> ₽</h3>
<button onclick="sendOrder()">Оформить заказ</button>
<button onclick="closeCart()">Закрыть</button>
</div>

<!-- BANNER -->
<div class="banner">
<img src="https://github.com/user-attachments/assets/48ec96f9-f570-4809-88b2-b67adbc084c4">
</div>

<!-- CATEGORIES -->
<div class="categories">
<div class="category active" onclick="filter('all',this)">Все</div>
<div class="category" onclick="filter('gems',this)">Гемы</div>
<div class="category" onclick="filter('passes',this)">Пропуски</div>
<div class="category" onclick="filter('resources',this)">Ресурсы</div>
<div class="category" onclick="filter('sales',this)">Акции</div>
</div>

<!-- PRODUCTS -->
<div class="products">

<div class="card" data-cat="gems">
<h3>30 Gems</h3>
<div class="price">130 ₽</div>
<button onclick="add('30 Gems',130,this)">В корзину</button>
</div>

<div class="card" data-cat="gems">
<h3>80 Gems</h3>
<div class="price">250 ₽</div>
<button onclick="add('80 Gems',250,this)">В корзину</button>
</div>

<div class="card" data-cat="passes">
<h3>Brawl Pass</h3>
<div class="price">300 ₽</div>
<button onclick="add('Brawl Pass',300,this)">В корзину</button>
</div>

<div class="card" data-cat="resources">
<h3>Coins Pack</h3>
<div class="price">199 ₽</div>
<button onclick="add('Coins Pack',199,this)">В корзину</button>
</div>

</div>

<script>

let cart = [];

function add(name,price,btn){

let item = cart.find(i=>i.name===name);

if(item) item.qty++;
else cart.push({name,price,qty:1});

update();
fly(btn);
toast("Добавлено");
}

function update(){

let items=document.getElementById("cart-items");
let total=0;
let count=0;

items.innerHTML="";

cart.forEach(i=>{
total+=i.price*i.qty;
count+=i.qty;

items.innerHTML+=`
<div class="cart-item">
<div>${i.name}</div>
<div>${i.qty} × ${i.price}</div>
</div>`;
});

document.getElementById("cart-total").innerText=total;
document.getElementById("cart-counter").innerText=count;
}

function openCart(){
document.getElementById("cart-panel").classList.add("open");
document.getElementById("cart-overlay").style.display="block";
}

function closeCart(){
document.getElementById("cart-panel").classList.remove("open");
document.getElementById("cart-overlay").style.display="none";
}

function filter(cat,el){

document.querySelectorAll(".category").forEach(c=>c.classList.remove("active"));
el.classList.add("active");

document.querySelectorAll(".card").forEach(c=>{
let show = cat==="all" || c.dataset.cat===cat;
c.style.display = show?"block":"none";
});
}

function fly(btn){

let cartIcon=document.querySelector(".cart-icon");

let start=btn.getBoundingClientRect();
let end=cartIcon.getBoundingClientRect();

let dot=document.createElement("div");
dot.className="fly-item";
document.body.appendChild(dot);

dot.style.left=start.left+"px";
dot.style.top=start.top+"px";

dot.animate([
{transform:"translate(0,0)"},
{transform:`translate(${end.left-start.left}px,${end.top-start.top}px)` }
],{duration:600});

setTimeout(()=>dot.remove(),600);
}

function toast(text){
let t=document.createElement("div");
t.innerText=text;
t.style.position="fixed";
t.style.bottom="20px";
t.style.left="50%";
t.style.transform="translateX(-50%)";
t.style.background="#8f42ff";
t.style.padding="10px 20px";
t.style.borderRadius="10px";
document.body.appendChild(t);
setTimeout(()=>t.remove(),1500);
}

/* particles */
for(let i=0;i<30;i++){
let p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"%";
p.style.animationDuration=(5+Math.random()*10)+"s";
document.getElementById("particles").appendChild(p);
}

/* SEND (заглушка под бота) */
async function sendOrder(){
toast("Заказ отправлен (бот подключён отдельно)");
cart=[];
update();
closeCart();
}

</script>

</body>
</html>
