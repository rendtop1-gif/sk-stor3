<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK Store</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#090909;
color:white;
}

/* HEADER */
header{
background:linear-gradient(135deg,#12001f,#250042);
padding:20px;
text-align:center;
position:relative;
border-bottom:2px solid #8f42ff;
}

.logo{
font-size:32px;
font-weight:bold;
color:#b06bff;
}

.subtitle{color:#ccc}

/* CART ICON */
.cart-icon{
position:absolute;
top:15px;
right:15px;
background:#8f42ff;
padding:10px 14px;
border-radius:50px;
cursor:pointer;
}

/* CATEGORIES */
.categories{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:20px;
}

.category{
background:#171717;
padding:12px;
border-radius:12px;
text-align:center;
cursor:pointer;
transition:.2s;
}

.category.active{
background:#8f42ff;
}

/* PRODUCTS */
.products{
padding:20px;
display:grid;
gap:15px;
}

.card{
background:#171717;
padding:15px;
border-radius:15px;
border:1px solid #2e2e2e;
}

.card.hide{
display:none;
}

.price{
color:#b06bff;
font-size:20px;
margin-top:5px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
background:#8f42ff;
border:none;
color:white;
border-radius:10px;
cursor:pointer;
}

/* CART */
#cart-panel{
position:fixed;
right:-400px;
top:0;
width:320px;
height:100%;
background:#171717;
padding:20px;
transition:.3s;
z-index:999;
}

#cart-panel.open{right:0}

#cart-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
display:none;
z-index:998;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:10px 0;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.7);
z-index:1000;
}

.modal-content{
background:#171717;
padding:20px;
border-radius:15px;
width:90%;
max-width:400px;
}

/* TOAST */
.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#8f42ff;
padding:10px 20px;
border-radius:10px;
}
</style>
</head>

<body>

<header>
<div class="logo">SK STORE</div>

<div class="cart-icon" onclick="openCart()">
🛒 <span id="cart-counter">0</span>
</div>
</header>

<div id="cart-overlay" onclick="closeCart()"></div>

<div id="cart-panel">
<h2>Корзина</h2>
<div id="cart-items"></div>
<h3>Итого: <span id="cart-total">0</span> ₽</h3>

<button onclick="sendOrder()">Оформить заказ</button>
<button onclick="closeCart()">Закрыть</button>
</div>

<!-- CATEGORIES -->
<div class="categories">

<div class="category active" onclick="filter('all',this)">Все</div>
<div class="category" onclick="filter('gems',this)">Гемы</div>
<div class="category" onclick="filter('passes',this)">Пропуски</div>
<div class="category" onclick="filter('skins',this)">Скины</div>
<div class="category" onclick="filter('resources',this)">Ресурсы</div>
<div class="category" onclick="filter('sales',this)">Акции</div>

</div>

<!-- PRODUCTS -->
<div class="products">

<!-- GEMS -->
<div class="card" data-category="gems">
<h3>30 Gems</h3>
<div class="price">130 ₽</div>
<button onclick="add('30 Gems',130)">В корзину</button>
</div>

<div class="card" data-category="gems">
<h3>80 Gems</h3>
<div class="price">250 ₽</div>
<button onclick="add('80 Gems',250)">В корзину</button>
</div>

<div class="card" data-category="gems">
<h3>170 Gems</h3>
<div class="price">500 ₽</div>
<button onclick="add('170 Gems',500)">В корзину</button>
</div>

<!-- PASSES -->
<div class="card" data-category="passes">
<h3>Brawl Pass</h3>
<div class="price">300 ₽</div>
<button onclick="add('Brawl Pass',300)">В корзину</button>
</div>

<div class="card" data-category="passes">
<h3>Brawl Pass Plus</h3>
<div class="price">650 ₽</div>
<button onclick="add('Brawl Pass Plus',650)">В корзину</button>
</div>

<!-- SKINS -->
<div class="card" data-category="skins">
<h3>Skin Pack</h3>
<div class="price">400 ₽</div>
<button onclick="add('Skin Pack',400)">В корзину</button>
</div>

</div>

<!-- CHECKOUT MODAL -->
<div id="checkout" class="modal">
<div class="modal-content">

<h2 id="orderText"></h2>

<p>💳 Т-Банк: XXXX XXXX XXXX XXXX</p>
<p>👤 Получатель: Имя Фамилия</p>

<p>После оплаты отправьте в Telegram: @asssssuna</p>

<button onclick="closeCheckout()">Закрыть</button>

</div>
</div>

<script>

let cart = [];
let orderId = Math.floor(1000 + Math.random()*9000);

/* ADD */
function add(name,price){

let item = cart.find(i=>i.name===name);

if(item) item.qty++;
else cart.push({name,price,qty:1});

updateCart();
toast("Добавлено");
}

/* CART */
function updateCart(){

let items=document.getElementById("cart-items");
let total=0,count=0;

items.innerHTML="";

cart.forEach(i=>{
total+=i.price*i.qty;
count+=i.qty;

items.innerHTML+=`
<div class="cart-item">
<div>${i.name}</div>
<div>${i.qty}</div>
</div>`;
});

document.getElementById("cart-total").innerText=total;
document.getElementById("cart-counter").innerText=count;
}

/* FILTER */
function filter(cat,el){

document.querySelectorAll(".category").forEach(c=>c.classList.remove("active"));
el.classList.add("active");

document.querySelectorAll(".card").forEach(card=>{
card.style.display =
cat==="all" || card.dataset.category===cat ? "block":"none";
});
}

/* CART OPEN */
function openCart(){
document.getElementById("cart-panel").classList.add("open");
document.getElementById("cart-overlay").style.display="block";
}

/* CART CLOSE */
function closeCart(){
document.getElementById("cart-panel").classList.remove("open");
document.getElementById("cart-overlay").style.display="none";
}

/* SEND */
async function sendOrder(){

if(cart.length===0){toast("Корзина пуста");return;}

let total=cart.reduce((s,i)=>s+i.price*i.qty,0);

const res=await fetch("/api/order",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({cart,total})
});

if(res.ok){
cart=[];
updateCart();
closeCart();

document.getElementById("orderText").innerText =
"Заказ #"+orderId+" создан";

document.getElementById("checkout").style.display="flex";
}
}

/* CLOSE MODAL */
function closeCheckout(){
document.getElementById("checkout").style.display="none";
}

/* TOAST */
function toast(t){
let d=document.createElement("div");
d.className="toast";
d.innerText=t;
document.body.appendChild(d);
setTimeout(()=>d.remove(),1500);
}

</script>

</body>
</html>
